[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# HTML — никогда не кэшировать
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# JS/CSS/изображения с хэшами — кэшировать навсегда
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

# Виджет можно встраивать на любой сайт через iframe
[[headers]]
  for = "/widget/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "frame-ancestors *"
